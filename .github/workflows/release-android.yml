name: Release Android

on:
  # After a release/hotfix PR merges to main with a version bump in pubspec.
  push:
    branches: [main]
    paths:
      - apps/mobile/pubspec.yaml
      - CHANGELOG.md
  # Manual re-run or one-off overrides (optional inputs).
  workflow_dispatch:
    inputs:
      version_name:
        description: Semantic version (e.g. 0.1.0); leave empty to use pubspec on main
        required: false
        type: string
      version_code:
        description: Android versionCode; leave empty to use pubspec on main
        required: false
        type: string
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      upload_to_play:
        description: Upload AAB to Google Play
        required: true
        default: true
        type: boolean
      create_github_release:
        description: Create git tag and GitHub Release with artifacts
        required: true
        default: true
        type: boolean

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Android release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release parameters
        id: release_params
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            eval "$(bash tool/release/verify_version.sh)"
            echo "VERSION_NAME=${version_name}" >> "${GITHUB_ENV}"
            echo "VERSION_CODE=${build_number}" >> "${GITHUB_ENV}"
            echo "FULL_VERSION=${version_name}+${build_number}" >> "${GITHUB_ENV}"
            echo "TAG_NAME=mobile-v${version_name}+${build_number}" >> "${GITHUB_ENV}"
            echo "PLAY_TRACK=internal" >> "${GITHUB_ENV}"
            echo "UPLOAD_TO_PLAY=true" >> "${GITHUB_ENV}"
            echo "CREATE_GITHUB_RELEASE=true" >> "${GITHUB_ENV}"
            echo "SKIP_BUMP=true" >> "${GITHUB_ENV}"
            echo "Release mode: automatic (push to main, version from pubspec)."
          else
            if [[ -n "${{ inputs.version_name }}" && -n "${{ inputs.version_code }}" ]]; then
              vn="${{ inputs.version_name }}"
              vc="${{ inputs.version_code }}"
            else
              eval "$(bash tool/release/verify_version.sh)"
              vn="${version_name}"
              vc="${build_number}"
            fi
            echo "VERSION_NAME=${vn}" >> "${GITHUB_ENV}"
            echo "VERSION_CODE=${vc}" >> "${GITHUB_ENV}"
            echo "FULL_VERSION=${vn}+${vc}" >> "${GITHUB_ENV}"
            echo "TAG_NAME=mobile-v${vn}+${vc}" >> "${GITHUB_ENV}"
            echo "PLAY_TRACK=${{ inputs.track }}" >> "${GITHUB_ENV}"
            echo "UPLOAD_TO_PLAY=${{ inputs.upload_to_play }}" >> "${GITHUB_ENV}"
            echo "CREATE_GITHUB_RELEASE=${{ inputs.create_github_release }}" >> "${GITHUB_ENV}"
            echo "SKIP_BUMP=false" >> "${GITHUB_ENV}"
            echo "Release mode: manual workflow_dispatch."
          fi

      - name: Resolve AdMob banner unit id
        id: admob
        env:
          ADMOB_VAR: ${{ vars.ADMOB_BANNER_ID }}
          ADMOB_SECRET: ${{ secrets.ADMOB_BANNER_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${ADMOB_VAR}" ]]; then
            echo "banner_id=${ADMOB_VAR}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${ADMOB_SECRET}" ]]; then
            echo "banner_id=${ADMOB_SECRET}" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Workspace dependencies
        run: flutter pub get

      - name: Bump version
        if: env.SKIP_BUMP != 'true'
        run: bash tool/release/bump_version.sh "${VERSION_NAME}" "${VERSION_CODE}" --allow-dirty

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Core tests
        run: cd packages/unrecorded_core && dart test

      - name: Radio tests
        run: cd packages/unrecorded_radio && flutter test

      - name: App tests
        run: cd apps/mobile && flutter test

      - name: Release copy guardrails
        run: bash tool/release/check_release_copy.sh

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required for release builds."
            exit 1
          fi
          for var in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} secret is required for release builds."
              exit 1
            fi
          done
          ANDROID_DIR="apps/mobile/android"
          KEYSTORE_FILE="ci-release.keystore.jks"
          # storeFile in key.properties is resolved relative to android/app/ (see build.gradle.kts).
          KEYSTORE_PATH="${ANDROID_DIR}/app/${KEYSTORE_FILE}"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${KEYSTORE_PATH}"
          if ! keytool -list -keystore "${KEYSTORE_PATH}" -storepass "${ANDROID_KEYSTORE_PASSWORD}" -alias "${ANDROID_KEY_ALIAS}" >/dev/null 2>&1; then
            echo "::error::Keystore decode failed or alias/password mismatch. Check ANDROID_KEYSTORE_* secrets."
            exit 1
          fi
          echo "::notice::Upload key SHA-1 (must match Play Console → Setup → App signing → Upload key certificate):"
          keytool -list -v -keystore "${KEYSTORE_PATH}" -storepass "${ANDROID_KEYSTORE_PASSWORD}" -alias "${ANDROID_KEY_ALIAS}" 2>/dev/null | grep -E "SHA1:|SHA256:" || true
          PROP_FILE="${ANDROID_DIR}/key.properties"
          echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}" > "${PROP_FILE}"
          echo "keyPassword=${ANDROID_KEY_PASSWORD}" >> "${PROP_FILE}"
          echo "keyAlias=${ANDROID_KEY_ALIAS}" >> "${PROP_FILE}"
          echo "storeFile=${KEYSTORE_FILE}" >> "${PROP_FILE}"

      - name: Build App Bundle (store artifact)
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          args=(--release)
          if [[ -z "${{ steps.admob.outputs.banner_id }}" ]]; then
            echo "::error::Set repository variable or secret ADMOB_BANNER_ID before running a release build."
            exit 1
          fi
          args+=(--dart-define=ADMOB_BANNER_ID="${{ steps.admob.outputs.banner_id }}")
          flutter build appbundle "${args[@]}"

      - name: Verify release AAB is signed
        run: |
          set -euo pipefail
          AAB="$(find apps/mobile/build -name 'app-release.aab' -type f | head -n 1)"
          if [[ -z "${AAB}" ]]; then
            echo "::error::app-release.aab not found after build"
            exit 1
          fi
          if ! unzip -l "${AAB}" | grep -qE 'META-INF/.*\.(RSA|DSA|EC)'; then
            echo "::error::AAB has no META-INF signatures — release signing did not run (check key.properties)."
            exit 1
          fi
          echo "AAB signature entries present."

      - name: Build release APK (convenience)
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          args=(--release)
          args+=(--dart-define=ADMOB_BANNER_ID="${{ steps.admob.outputs.banner_id }}")
          flutter build apk "${args[@]}"

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          AAB="$(find apps/mobile/build -name '*.aab' -type f | head -n 1)"
          APK="$(find apps/mobile/build -name '*release*.apk' -type f | head -n 1)"
          if [[ -z "${AAB}" ]]; then
            echo "::error::No .aab found under apps/mobile/build"
            exit 1
          fi
          cp "${AAB}" "${RUNNER_TEMP}/app-release.aab"
          if [[ -n "${APK}" ]]; then
            cp "${APK}" "${RUNNER_TEMP}/app-release.apk"
          fi

      - name: Extract release notes
        run: bash tool/release/extract_release_notes.sh "${FULL_VERSION}" "${RUNNER_TEMP}/release-notes.md"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.FULL_VERSION }}
          path: |
            ${{ runner.temp }}/app-release.aab
            ${{ runner.temp }}/app-release.apk
            ${{ runner.temp }}/release-notes.md
          if-no-files-found: warn

      - name: Prepare Google Play service account JSON
        id: play_credentials
        if: env.UPLOAD_TO_PLAY == 'true'
        env:
          PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_JSON_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/play-service-account.json"
          if [[ -n "${PLAY_JSON:-}" ]]; then
            printf '%s' "${PLAY_JSON}" > "${OUT}"
          elif [[ -n "${PLAY_JSON_B64:-}" ]]; then
            echo "${PLAY_JSON_B64}" | base64 -d > "${OUT}"
          else
            echo "::error::Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 when upload_to_play is true."
            exit 1
          fi
          echo "path=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        if: env.CREATE_GITHUB_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Unrecorded ${{ env.FULL_VERSION }} (Android)
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            ${{ runner.temp }}/app-release.aab
            ${{ runner.temp }}/app-release.apk
            ${{ runner.temp }}/release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Upload to Google Play (internal draft)
        id: play_upload
        if: env.UPLOAD_TO_PLAY == 'true'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.play_credentials.outputs.path }}
          packageName: app.unrecorded.unrecorded_mobile
          releaseFiles: ${{ runner.temp }}/app-release.aab
          track: ${{ env.PLAY_TRACK }}
          status: draft

      - name: Play upload result
        if: env.UPLOAD_TO_PLAY == 'true' && steps.play_upload.outcome == 'failure'
        run: |
          echo "::warning::Play upload failed (often upload key not registered in Play Console). GitHub Release and artifacts were still published."
          exit 1
