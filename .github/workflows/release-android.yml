name: Release Android

on:
  # Manual only — run from branch `main` in the Actions UI (see docs/release.md).
  workflow_dispatch:
    inputs:
      version_name:
        description: Semantic version (e.g. 0.1.0)
        required: true
        type: string
      version_code:
        description: Android versionCode / iOS build number (integer)
        required: true
        type: string
      track:
        description: Google Play track (when upload_to_play is true)
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      upload_to_play:
        description: Upload AAB to Google Play
        required: true
        default: false
        type: boolean
      create_github_release:
        description: Create git tag and GitHub Release with artifacts
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Android release
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ inputs.version_name }}
      VERSION_CODE: ${{ inputs.version_code }}
      FULL_VERSION: ${{ inputs.version_name }}+${{ inputs.version_code }}
      TAG_NAME: mobile-v${{ inputs.version_name }}+${{ inputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve AdMob banner unit id
        id: admob
        env:
          ADMOB_VAR: ${{ vars.ADMOB_BANNER_ID }}
          ADMOB_SECRET: ${{ secrets.ADMOB_BANNER_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${ADMOB_VAR}" ]]; then
            echo "banner_id=${ADMOB_VAR}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${ADMOB_SECRET}" ]]; then
            echo "banner_id=${ADMOB_SECRET}" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Workspace dependencies
        run: flutter pub get

      - name: Bump version
        run: ./tool/release/bump_version.sh "${VERSION_NAME}" "${VERSION_CODE}" --allow-dirty

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Core tests
        run: cd packages/unrecorded_core && dart test

      - name: Radio tests
        run: cd packages/unrecorded_radio && flutter test

      - name: App tests
        run: cd apps/mobile && flutter test

      - name: Release copy guardrails
        run: ./tool/release/check_release_copy.sh

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required for release builds."
            exit 1
          fi
          for var in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} secret is required for release builds."
              exit 1
            fi
          done
          KEYSTORE_PATH="${RUNNER_TEMP}/upload-keystore.jks"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${KEYSTORE_PATH}"
          {
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "storeFile=${KEYSTORE_PATH}"
          } > apps/mobile/android/key.properties

      - name: Build App Bundle (store artifact)
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          args=(--release)
          if [[ -z "${{ steps.admob.outputs.banner_id }}" ]]; then
            echo "::error::Set repository variable or secret ADMOB_BANNER_ID before running a release build."
            exit 1
          fi
          args+=(--dart-define=ADMOB_BANNER_ID="${{ steps.admob.outputs.banner_id }}")
          flutter build appbundle "${args[@]}"

      - name: Build release APK (convenience)
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          args=(--release)
          args+=(--dart-define=ADMOB_BANNER_ID="${{ steps.admob.outputs.banner_id }}")
          flutter build apk "${args[@]}"

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          AAB="$(find apps/mobile/build -name '*.aab' -type f | head -n 1)"
          APK="$(find apps/mobile/build -name '*release*.apk' -type f | head -n 1)"
          if [[ -z "${AAB}" ]]; then
            echo "::error::No .aab found under apps/mobile/build"
            exit 1
          fi
          cp "${AAB}" "${RUNNER_TEMP}/app-release.aab"
          if [[ -n "${APK}" ]]; then
            cp "${APK}" "${RUNNER_TEMP}/app-release.apk"
          fi

      - name: Extract release notes
        run: ./tool/release/extract_release_notes.sh "${FULL_VERSION}" "${RUNNER_TEMP}/release-notes.md"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.FULL_VERSION }}
          path: |
            ${{ runner.temp }}/app-release.aab
            ${{ runner.temp }}/app-release.apk
            ${{ runner.temp }}/release-notes.md
          if-no-files-found: warn

      - name: Prepare Google Play service account JSON
        id: play_credentials
        if: inputs.upload_to_play == true
        env:
          PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_JSON_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/play-service-account.json"
          if [[ -n "${PLAY_JSON:-}" ]]; then
            printf '%s' "${PLAY_JSON}" > "${OUT}"
          elif [[ -n "${PLAY_JSON_B64:-}" ]]; then
            echo "${PLAY_JSON_B64}" | base64 -d > "${OUT}"
          else
            echo "::error::Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 when upload_to_play is true."
            exit 1
          fi
          echo "path=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload to Google Play
        if: inputs.upload_to_play == true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.play_credentials.outputs.path }}
          packageName: app.unrecorded.unrecorded_mobile
          releaseFiles: ${{ runner.temp }}/app-release.aab
          track: ${{ inputs.track }}
          status: draft

      - name: Create GitHub Release
        if: inputs.create_github_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Unrecorded ${{ env.FULL_VERSION }} (Android)
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            ${{ runner.temp }}/app-release.aab
            ${{ runner.temp }}/app-release.apk
            ${{ runner.temp }}/release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
