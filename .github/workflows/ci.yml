name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run core tests
        working-directory: packages/unrecorded_core
        run: dart test --reporter expanded

      - name: Run radio tests
        working-directory: packages/unrecorded_radio
        run: flutter test

      - name: Run app tests
        working-directory: apps/mobile
        run: flutter test

  build-android:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        working-directory: apps/mobile
        run: flutter build apk --debug

      # TODO: Add iOS build job when signing is set up.
