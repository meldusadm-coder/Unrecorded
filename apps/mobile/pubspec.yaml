name: unrecorded_mobile
description: Unrecorded — detect possible nearby smart glasses and wearable recording devices.
publish_to: none
version: 0.2.1+5

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^15.0.0
  flutter_blue_plus: ^1.36.8
  permission_handler: ^11.3.0
  shared_preferences: ^2.3.0
  device_info_plus: ^11.3.0
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  home_widget: ^0.7.0
  unrecorded_core:
    path: ../../packages/unrecorded_core
  unrecorded_radio:
    path: ../../packages/unrecorded_radio
  unrecorded_ui:
    path: ../../packages/unrecorded_ui
  flutter_svg: ^2.0.17
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon_accent.png
  adaptive_icon_background: "#5B4DFF"
  adaptive_icon_foreground: assets/brand/logo_mark_foreground.png
